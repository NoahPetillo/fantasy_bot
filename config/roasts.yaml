# ─────────────────────────────────────────────────────────────────────────────
# ROAST BOOK — inside jokes the caption writer sprinkles in occasionally.
#
# HOW IT WORKS
#   • Keyed by ESPN league_id (top level), so each season's league is separate.
#     The engine auto-loads the block matching your current ESPN_LEAGUE_ID.
#   • Each manager is keyed by their ESPN FIRST NAME (that's the join to the
#     league data). Add `nickname:` if the group calls them something else.
#   • `notes:` is a list — add as many as you want over time; one is picked at a
#     time. A given person's joke only fires ~1 in CONTENT_ROAST_FREQUENCY of the
#     moments they star in (default 3 ≈ "every few weeks"), so it stays fresh.
#
# NEXT SEASON / NEW LEAGUE
#   Add a new `"<new_league_id>":` block below with that league's people. To get
#   the ESPN first names for a league, run:
#     uv run python -c "from fantasy.espn.client import EspnClient as E; \
#       print({t.team_id: (t.owners[0].get('firstName')) for t in E().teams()})"
# ─────────────────────────────────────────────────────────────────────────────

leagues:

  # ── 2025 league ──
  "1893434977":
    managers:
      - name: Cam
        notes:
          - "Once skipped the draft because he 'had to hang out with friends' — now 'sorry, gotta hang with friends (fuck you Cam)' is a permanent bit."
