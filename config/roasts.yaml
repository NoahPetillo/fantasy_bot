      - name: Ethan
        notes:
          - "Has a freakishly enormous big toe."
      - name: Brady
        notes:
          - "NEVER responds in the group chat. Quietly a good manager, but we genuinely forget he exists half the time."
      - name: Adam
        notes:
          - "Just bad. Trades constantly and loses basically all of them despite having a good team."

