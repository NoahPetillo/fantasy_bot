# Curated fantasy-football expert registry (the differentiator's seed list).
# Edit freely — loaded at runtime, no code change needed. `outlet` is what counts
# for independence (two analysts at the same outlet are NOT independent sources).
# bsky_handle null = not on Bluesky / unverified (the X adapter, if enabled, covers it).
# Group D (data scientists) are used as TOOLS (nflverse/ffopportunity), not tweet feeds.

experts:
  # ── Group A: news breakers (injuries / inactives / transactions) ──
  - {name: Adam Schefter,   x_handle: AdamSchefter,  bsky_handle: null,                  outlet: ESPN,         group: breaker, tier: 1, base_trust: 0.95, specialties: [injury, transaction]}
  - {name: Ian Rapoport,    x_handle: RapSheet,      bsky_handle: rapsheet.bsky.social,  outlet: NFLNetwork,   group: breaker, tier: 1, base_trust: 0.95, specialties: [injury, transaction]}
  - {name: Tom Pelissero,   x_handle: TomPelissero,  bsky_handle: null,                  outlet: NFLNetwork,   group: breaker, tier: 1, base_trust: 0.90, specialties: [injury, practice]}
  - {name: Mike Garafolo,   x_handle: MikeGarafolo,  bsky_handle: null,                  outlet: NFLNetwork,   group: breaker, tier: 1, base_trust: 0.88, specialties: [injury, practice]}
  - {name: Field Yates,     x_handle: FieldYates,    bsky_handle: null,                  outlet: ESPN,         group: breaker, tier: 1, base_trust: 0.88, specialties: [waiver, injury]}

  # ── Group B: medical / return-timeline ──
