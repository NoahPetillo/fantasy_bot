  # ── Group C: waiver / FAAB / opportunity-trend ──
  - {name: Hayden Winks,    x_handle: HaydenWinks,   bsky_handle: null,                  outlet: Underdog,     group: waiver,  tier: 1, base_trust: 0.82, specialties: [waiver, usage_change, breakout]}
  - {name: Graham Barfield, x_handle: GrahamBarfield, bsky_handle: null,                 outlet: FantasyPoints, group: waiver, tier: 1, base_trust: 0.82, specialties: [usage_change, breakout]}
  - {name: JJ Zachariason,  x_handle: LateRoundQB,   bsky_handle: null,                  outlet: Independent,  group: waiver,  tier: 1, base_trust: 0.82, specialties: [waiver]}
  - {name: Ben Gretch,      x_handle: YardsPerGretch, bsky_handle: null,                 outlet: Independent,  group: waiver,  tier: 1, base_trust: 0.82, specialties: [usage_change]}
  - {name: Mike Clay,       x_handle: MikeClayNFL,   bsky_handle: null,                  outlet: ESPN,         group: waiver,  tier: 1, base_trust: 0.85, specialties: [usage_change]}
  - {name: Scott Barrett,   x_handle: ScottBarrettDFB, bsky_handle: null,                outlet: FantasyPoints, group: waiver, tier: 2, base_trust: 0.80, specialties: [usage_change, breakout]}
  - {name: Rich Hribar,     x_handle: LordReebs,     bsky_handle: null,                  outlet: Sharp,        group: waiver,  tier: 2, base_trust: 0.78, specialties: [waiver]}

  # ── Group E: proven winners / accuracy anchors (calibration seeds) ──
  - {name: Justin Boone,    x_handle: justinboone,   bsky_handle: null,                  outlet: Yahoo,        group: winner,  tier: 1, base_trust: 0.85, specialties: [ranking]}
