# Free RSS feeds (no auth, no cost). outlet for independence counting.
rss_feeds:
  - {name: ESPN NFL News, url: "https://www.espn.com/espn/rss/nfl/news", outlet: ESPN, base_trust: 0.72}
  - {name: ProFootballTalk, url: "https://profootballtalk.nbcsports.com/feed/", outlet: PFT, base_trust: 0.70}
  - {name: CBS Sports NFL, url: "https://www.cbssports.com/rss/headlines/nfl/", outlet: CBS, base_trust: 0.68}

# Group D data-science TOOLS (used programmatically elsewhere, listed for provenance).
data_tools:
  - {name: nflverse, who: "Ben Baldwin / Sebastian Carl", use: "nflreadpy weekly stats, EPA, snaps"}
  - {name: ffopportunity, who: "Tan Ho / Joe Sydlowski", use: "expected fantasy points (xFP)"}
