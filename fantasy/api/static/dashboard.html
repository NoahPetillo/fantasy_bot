<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fantasy Copilot</title>
<style>
  :root{
    --bg:#0a0f1c; --panel:#111a2e; --panel2:#0e1626; --line:rgba(255,255,255,.09);
    --text:#e6edf7; --muted:#93a2bd; --faint:#5f6f8c; --accent:#d64d2f; --blue:#3b82f6;
    --green:#22c55e; --red:#ef4444; --amber:#f59e0b; --radius:13px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--blue);text-decoration:none}
  button{font:inherit;border:0;border-radius:9px;padding:8px 14px;font-weight:600;cursor:pointer;color:#fff;background:var(--blue)}
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
  button.ok{background:var(--green)} button.danger{background:transparent;border:1px solid var(--red);color:#f4b0a8}
  button:disabled{opacity:.45;cursor:not-allowed}
  input,textarea{width:100%;padding:9px 11px;border-radius:9px;border:1px solid var(--line);background:#0b1120;color:var(--text);font-size:14px}
  .center{min-height:70vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;text-align:center;padding:24px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--line);background:var(--panel2);position:sticky;top:0;z-index:5}
  .brand{font-weight:700;letter-spacing:.3px}
  .brand small{color:var(--faint);font-weight:400;margin-left:8px}
  .wrap{display:grid;grid-template-columns:260px 1fr;gap:18px;max-width:1180px;margin:0 auto;padding:18px 20px}
  @media(max-width:820px){.wrap{grid-template-columns:1fr}}
  .side h3{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);margin:2px 0 10px}
  .lg{display:flex;justify-content:space-between;align-items:center;padding:9px 11px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer}
  .lg.active{border-color:var(--accent);background:rgba(214,77,47,.08)}
  .lg .sub{color:var(--faint);font-size:12px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:16px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .kpi .v{font-size:24px;font-weight:700}.kpi .l{color:var(--muted);font-size:12px}.kpi .s{color:var(--faint);font-size:11px}
  .sec{margin:18px 0}.sec h2{font-size:15px;margin:0 0 10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .row{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:11px 13px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px}
  .row .meta{color:var(--faint);font-size:12px}
  .pill{font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .pill.approved{color:#bff0d0;border-color:var(--green)} .pill.rejected{color:#f4b0a8;border-color:var(--red)}
  .pill.executed{color:#bfe0ff;border-color:var(--blue)}
  .acts{display:flex;gap:6px;flex-wrap:wrap}.acts button{padding:5px 10px;font-size:12px}
  table{width:100%;border-collapse:collapse;font-size:14px}th,td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--line)}
  th{color:var(--faint);font-weight:600;font-size:12px}
  .overlay{position:fixed;inset:0;background:rgba(4,7,14,.72);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:10;overflow:auto}
  .overlay.show{display:flex}
  .modal{max-width:600px;width:100%}
  .msg{margin-top:10px;padding:10px 12px;border-radius:9px;font-size:13px;display:none}
  .msg.ok{display:block;background:rgba(34,197,94,.12);border:1px solid var(--green)}
  .msg.err{display:block;background:rgba(239,68,68,.12);border:1px solid #f4b0a8;color:#f4c2bd}
  .consent{display:flex;gap:10px;align-items:flex-start;margin:14px 0;padding:12px;border:1px solid var(--line);border-radius:10px;background:#0b1120}
  .consent input{width:17px;height:17px;flex:none;margin-top:3px}
  .copy p{margin:8px 0}.copy code{background:#0b1120;border:1px solid var(--line);padding:1px 5px;border-radius:5px}
  .chatbox{margin-top:6px}.chatlog{max-height:230px;overflow:auto;font-size:14px}
  .chatlog .q{color:var(--muted);margin-top:8px}.chatlog .a{margin:2px 0 6px}
  footer{max-width:1180px;margin:0 auto;padding:22px 20px 48px;color:var(--faint);font-size:12px;border-top:1px solid var(--line)}
  .muted{color:var(--muted)}.faint{color:var(--faint)}
</style>
</head>
<body>
<div id="root"><div class="center"><div class="muted">Loading…</div></div></div>

<!-- Settings modal -->
<div class="overlay" id="settings">
  <div class="modal card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2 style="margin:0">Settings</h2><button class="ghost" onclick="closeSettings()">Close</button>
    </div>

    <div class="sec">
      <h2>ESPN connection</h2>
      <div id="espnStatus" class="muted">…</div>
      <div id="espnCopy" class="copy" style="margin-top:8px"></div>
      <label class="faint" style="font-size:12px">espn_s2</label>
      <input id="s2" autocomplete="off" spellcheck="false" placeholder="paste espn_s2 cookie" />
      <label class="faint" style="font-size:12px">SWID</label>
      <input id="swid" autocomplete="off" spellcheck="false" placeholder="{XXXX-XXXX-…}" />
      <div class="consent"><input type="checkbox" id="consent" />
        <label for="consent" id="consentLabel">I understand and consent.</label></div>
      <div class="acts">
        <button id="connectBtn" disabled onclick="doConnect()">Connect ESPN</button>
        <button class="ghost" id="testBtn" onclick="doTest()" style="display:none">Test connection</button>
        <button class="danger" id="discBtn" onclick="doDisconnect()" style="display:none">Disconnect</button>
      </div>
      <div class="msg" id="espnMsg"></div>
    </div>

    <div class="sec">
      <h2>Plan &amp; billing</h2>
      <div id="billing" class="muted">…</div>
      <div class="acts" style="margin-top:10px">
        <button id="upgradeBtn" style="display:none" onclick="upgrade()">Upgrade to Pro</button>
        <button id="manageBtn" class="ghost" style="display:none" onclick="manageBilling()">Manage billing</button>
      </div>
    </div>

    <div class="sec">
      <h2>Danger zone</h2>
      <button class="danger" onclick="deleteAccount()">Delete my account</button>
      <div class="faint" style="margin-top:6px">Removes your account, ESPN credentials, leagues, and data — immediately.</div>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
let CLERK = null, CONSENT_VERSION = null, LEAGUES = [], ACTIVE = null;

// ── tiny inline markdown (for the consent copy) ──
function mdInline(s){ return esc(s)
  .replace(/\[([^\]]+)\]\(([^)]+)\)/g,(m,t,u)=>`<a href="${u}" target="_blank">${t}</a>`)
  .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/`([^`]+)`/g,"<code>$1</code>"); }
function renderConsent(md){
  const out=[],para=[]; let label=null;
  const flush=()=>{ if(para.length){out.push(`<p>${mdInline(para.join(" "))}</p>`);para.length=0;} };
  for(const raw of md.split("\n")){ const line=raw.trim();
    if(/^-\s*\[\s*\]/.test(line)){ label=line.replace(/^-\s*\[\s*\]\s*/,""); continue; }
    if(/\[\s*Connect ESPN\s*\]/i.test(line)) continue;
    if(line.startsWith("### ")){ flush(); out.push(`<h3 style="margin:12px 0 4px">${mdInline(line.slice(4))}</h3>`); }
    else if(!line) flush(); else para.push(line);
  } flush();
  $("espnCopy").innerHTML=out.join(""); if(label) $("consentLabel").innerHTML=mdInline(label);
}

// ── API helper (attaches the Clerk session token) ──
async function api(method, path, body){
  const headers={"Content-Type":"application/json"};
  if(CLERK && CLERK.session){ const t=await CLERK.session.getToken(); if(t) headers.Authorization="Bearer "+t; }
  const res=await fetch(path,{method,headers,body:body?JSON.stringify(body):undefined});
  let data={}; try{ data=await res.json(); }catch(_){}
  if(!res.ok) throw new Error(data.detail || `Request failed (${res.status})`);
  return data;
}

// ── boot ──
async function boot(){
  let cfg; try{ cfg=await (await fetch("/api/config")).json(); }catch(_){ cfg={}; }
  if(!cfg.auth_configured){
    $("root").innerHTML=`<div class="center"><h2>Sign-in isn't configured yet</h2>
      <div class="muted">Set <code>CLERK_PUBLISHABLE_KEY</code> and <code>CLERK_SECRET_KEY</code> on the server, then reload.</div>
      <div class="faint"><a href="/privacy">Privacy</a> · <a href="/terms">Terms</a></div></div>`;
    return;
  }
  const s=document.createElement("script");
  s.setAttribute("data-clerk-publishable-key", cfg.clerk_publishable_key);
  s.async=true; s.crossOrigin="anonymous";
  s.src=`https://${cfg.clerk_frontend_api}/npm/@clerk/clerk-js@5/dist/clerk.browser.js`;
  s.onload=async()=>{ CLERK=window.Clerk; await CLERK.load();
    CLERK.addListener(()=>renderAuth()); renderAuth(); };
  s.onerror=()=>{ $("root").innerHTML=`<div class="center"><div class="err">Couldn't load Clerk.</div></div>`; };
  document.head.appendChild(s);
}

function renderAuth(){
  if(!CLERK.user){
    $("root").innerHTML=`<div class="center"><div class="brand" style="font-size:20px">Fantasy Copilot</div>
      <div id="signin"></div><div class="faint"><a href="/privacy">Privacy</a> · <a href="/terms">Terms</a></div></div>`;
    CLERK.mountSignIn($("signin"));
    return;
  }
  $("root").innerHTML=`
    <header><div class="brand">Fantasy Copilot <small id="whoami"></small></div>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="ghost" onclick="openSettings()">Settings</button><div id="ub"></div></div></header>
    <div class="wrap">
      <div class="side">
        <h3>Leagues</h3><div id="leagues"></div>
        <div class="card" style="margin-top:10px">
          <div class="faint" style="font-size:12px;margin-bottom:6px">Add a league</div>
          <input id="lgId" placeholder="ESPN league id" />
          <div style="display:flex;gap:6px;margin-top:6px">
            <input id="lgTeam" placeholder="team id" /><input id="lgSeason" placeholder="season" />
          </div>
          <button style="margin-top:8px;width:100%" onclick="addLeague()">Add league</button>
          <div class="msg" id="addMsg"></div>
        </div>
      </div>
      <div><div id="dash"></div>
        <div class="sec card chatbox"><h2 style="margin-top:0">Ask the copilot</h2>
          <div class="chatlog" id="chatlog"></div>
          <div style="display:flex;gap:6px;margin-top:8px">
            <input id="q" placeholder="e.g. Who should I start at flex?" onkeydown="if(event.key==='Enter')ask()" />
            <button onclick="ask()">Ask</button></div></div>
      </div>
    </div>
    <footer><strong>Fantasy Copilot</strong> is an independent tool, not affiliated with, authorized,
      or endorsed by ESPN or The Walt Disney Company. · <a href="/privacy">Privacy</a> · <a href="/terms">Terms</a></footer>`;
  CLERK.mountUserButton($("ub"));
  api("GET","/api/me").then(u=>$("whoami").textContent=u.email||"").catch(()=>{});
  loadLeagues();
}

// ── leagues ──
async function loadLeagues(){
  try{ const d=await api("GET","/api/leagues"); LEAGUES=d.leagues; ACTIVE=ACTIVE||d.active; }
  catch(e){ LEAGUES=[]; }
  const el=$("leagues");
  if(!LEAGUES.length){ el.innerHTML=`<div class="faint" style="font-size:13px">No leagues yet. Connect ESPN in Settings, then add one.</div>`; }
  else el.innerHTML=LEAGUES.map(l=>`<div class="lg ${l.league_id===ACTIVE?'active':''}" onclick="selectLeague('${l.league_id}')">
    <div><div>${esc(l.name)}</div><div class="sub">${esc(l.season)} · ${esc(l.build_status||'')}</div></div>
    <button class="ghost" style="padding:3px 8px;font-size:12px" onclick="event.stopPropagation();buildLeague('${l.league_id}')">Build</button></div>`).join("");
  if(ACTIVE) renderDashboard();
}
function selectLeague(id){ ACTIVE=id; loadLeagues(); }
async function addLeague(){
  const body={league_id:$("lgId").value.trim(),team_id:$("lgTeam").value.trim()||null,season:$("lgSeason").value.trim()||null};
  try{ const r=await api("POST","/api/leagues",body); ACTIVE=r.league.league_id; msg("addMsg","League added.",true); loadLeagues(); }
  catch(e){ msg("addMsg",e.message,false); }
}
async function buildLeague(id){ try{ await api("POST",`/api/leagues/${id}/build`); setTimeout(loadLeagues,1500); }catch(e){} }

// ── dashboard ──
async function renderDashboard(){
  let d; try{ d=await api("GET",`/api/dashboard?league=${ACTIVE}`); }catch(e){ $("dash").innerHTML=`<div class="card">${esc(e.message)}</div>`; return; }
  const t=d.team||{};
  const kpis=(d.kpis||[]).map(k=>`<div class="kpi"><div class="v">${esc(k.value)}</div><div class="l">${esc(k.label)}</div><div class="s">${esc(k.sub||'')}</div></div>`).join("");
  const lineup=(d.lineup||[]).map(r=>`<tr><td>${esc(r.slot)}</td><td>${esc(r.name)}</td><td>${esc(r.pos)}</td><td>${esc(r.proj)}</td></tr>`).join("");
  const status=(id)=>{ const s=(d.statuses||{})[id]; return s?`<span class="pill ${esc(s)}">${esc(s)}</span>`:""; };
  const actbtns=(id,s)=>{ s=(d.statuses||{})[id]||s;
    if(s==="executed") return status(id);
    const b=[]; if(s==="proposed"){ b.push(`<button class="ok" onclick="decide('${id}','approve')">Approve</button>`); b.push(`<button class="ghost" onclick="decide('${id}','reject')">Reject</button>`);}
    else { b.push(`<button class="ghost" onclick="decide('${id}','undo')">Undo</button>`); b.push(`<button onclick="decide('${id}','confirm')">Confirm on ESPN</button>`);}
    return status(id)+`<span class="acts">${b.join("")}</span>`; };
  const waivers=(d.waivers||[]).map(w=>`<div class="row"><div><div>➕ ${esc(w.add)} <span class="faint">/ drop ${esc(w.drop)}</span></div><div class="meta">${esc(w.reason)}</div></div><div class="acts">${actbtns(w.id,'proposed')}</div></div>`).join("");
  const trades=(d.trades||[]).map(x=>`<div class="row"><div><div>🔁 get ${esc(x.get)} <span class="faint">/ give ${esc(x.give)}</span> ${x.priority?'<span class="pill">priority</span>':''}</div><div class="meta">${esc(x.reason)}</div></div><div class="acts">${actbtns(x.id,'proposed')}</div></div>`).join("");
  const standings=(d.standings||[]).map(s=>`<tr><td>${s.rank}</td><td>${esc(s.team)}${s.me?' <span class="pill">you</span>':''}</td><td>${s.w}-${s.l}</td><td>${esc(s.pf)}</td></tr>`).join("");
  const feed=(d.feed||[]).map(f=>`<div class="row"><div><div>${esc(f.title)}</div><div class="meta">${esc(f.detail)}</div></div>${f.corroborated?'<span class="pill">corroborated</span>':''}</div>`).join("");
  const inf=d.influence;
  const pill=(s)=>`<span class="pill ${esc(s)}">${esc(s)}</span>`;
  const inflog=(inf&&(inf.log||[]).length)?`<table style="margin-top:8px"><tr><th>Kind</th><th>Recommendation</th><th>Wk</th><th>Value</th><th>Outcome</th></tr>${inf.log.slice(0,12).map(l=>`<tr><td>${esc(l.kind)}</td><td>${esc(l.title)}</td><td>${esc(l.week)}</td><td>${esc(l.value)}</td><td>${pill(l.status)}</td></tr>`).join("")}</table>`:'';
  // Season report card (the decision audit) — best-effort; present after a full build.
  const rep=d.report;
  const ss=rep&&rep.startsit, mt=rep&&rep.model_trades, wv=rep&&rep.waiver;
  const reportCard=rep?`<div class="sec"><h2>Season report card</h2><div class="kpis">
      ${ss?`<div class="kpi"><div class="v">${esc(ss.total_left_on_bench)}</div><div class="l">Pts left on bench</div><div class="s">${esc(ss.avg_per_week)}/wk start-sit regret</div></div>`:''}
      ${mt&&mt.n?`<div class="kpi"><div class="v">${Math.round((mt.win_rate||0)*100)}%</div><div class="l">Bot trade hit-rate</div><div class="s">avg +${esc(mt.mean)} · best +${esc(mt.best)}</div></div>`:''}
      ${wv?`<div class="kpi"><div class="v">${esc(wv.skill_asset)}</div><div class="l">Waiver value (skill)</div><div class="s">stream ${esc(wv.stream_asset)}</div></div>`:''}
      <div class="kpi"><div class="v">${esc(rep.trades_made??0)}</div><div class="l">Trades made</div><div class="s">of ${esc(rep.league_trades??0)} leaguewide</div></div>
    </div>${mt&&mt.best_trade?`<div class="row"><div>Best bot trade idea: get <strong>${esc(mt.best_trade.get)}</strong> / give ${esc(mt.best_trade.give)}</div><div class="meta">would have realized +${esc(mt.best_trade.realized)}</div></div>`:''}</div>`:'';
  $("dash").innerHTML=`
    <div class="card"><div style="font-size:18px;font-weight:700">${esc(t.name||'')}</div>
      <div class="muted">${esc(t.league||'')} · week ${esc(t.week||'—')}</div>
      ${t.build_status==='building'?'<div class="faint">Building full analysis…</div>':''}</div>
    <div class="kpis" style="margin-top:14px">${kpis}</div>
    ${lineup?`<div class="sec"><h2>Optimal lineup · start/sit (${esc(d.lineup_total||0)})</h2><table><tr><th>Slot</th><th>Player</th><th>Pos</th><th>Proj</th></tr>${lineup}</table></div>`:''}
    ${waivers?`<div class="sec"><h2>Waiver targets</h2>${waivers}</div>`:''}
    ${trades?`<div class="sec"><h2>Trade ideas</h2>${trades}</div>`:''}
    <div class="sec"><h2>Trade analyzer</h2>
      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        <input id="taGive" placeholder="you give (player)" style="flex:1;min-width:130px" />
        <input id="taGet" placeholder="you get (player)" style="flex:1;min-width:130px" />
        <button onclick="analyzeTrade()">Analyze</button></div>
      <div class="msg" id="taResult" style="margin-top:8px"></div></div>
    ${reportCard}
    ${inf?`<div class="sec"><h2>Bot influence</h2><div class="row"><div>Followed ${esc(inf.followed)} · Confirmed ${esc(inf.confirmed)} · Rejected ${esc(inf.rejected)} · Pending ${esc(inf.pending)}</div><div class="meta">acceptance ${esc(inf.acceptance_rate??'—')}</div></div>${inflog}</div>`:''}
    ${feed?`<div class="sec"><h2>News &amp; alerts</h2>${feed}</div>`:''}
    ${standings?`<div class="sec"><h2>Standings</h2><table><tr><th>#</th><th>Team</th><th>W-L</th><th>PF</th></tr>${standings}</table></div>`:''}`;
}
async function decide(id,action){ try{ await api("POST",`/proposals/${id}/${action}`); renderDashboard(); }catch(e){ alert(e.message); } }
async function analyzeTrade(){
  const give=($("taGive").value||"").trim(), get=($("taGet").value||"").trim();
  const m=$("taResult"); if(!give||!get){ m.className="msg err"; m.textContent="Enter both players."; return; }
  try{
    const r=await api("POST","/api/analyze-trade",{give,get,league:ACTIVE});
    if(r.error){ m.className="msg err"; m.textContent=r.error; return; }
    m.className="msg ok";
    m.innerHTML=`Net VOR ${r.net>=0?'+':''}${esc(r.net)} in your favor — <strong>${esc(r.fairness)}</strong>. `+
      `<span class="faint">give ${esc(give)} (VOR ${esc(r.give_vor)}) ↔ get ${esc(get)} (VOR ${esc(r.get_vor)})</span>`;
  }catch(e){ m.className="msg err"; m.textContent=e.message; }
}

// ── chat ──
async function ask(){
  const q=$("q").value.trim(); if(!q) return; $("q").value="";
  const log=$("chatlog"); log.insertAdjacentHTML("beforeend",`<div class="q">${esc(q)}</div><div class="a" data-p>…</div>`);
  const el=log.querySelector(".a:last-child"); log.scrollTop=log.scrollHeight;
  try{ const r=await api("POST","/api/chat",{question:q,league:ACTIVE}); el.textContent=r.answer||JSON.stringify(r); }
  catch(e){ el.textContent=e.message; } log.scrollTop=log.scrollHeight;
}

// ── settings / connect ESPN ──
async function openSettings(){
  $("settings").classList.add("show");
  try{ const c=await api("GET","/api/legal/espn-consent"); CONSENT_VERSION=c.version; renderConsent(c.markdown||""); }catch(_){}
  refreshEspnStatus();
  refreshBilling();
}
async function refreshBilling(){
  try{
    const s = await api("GET","/api/billing/status"); const c = s.chat || {};
    let html = `Plan: <strong>${esc(s.plan_label||s.plan)}</strong> · Chat today: ${esc(c.used)}/${esc(c.limit)} · Leagues: ${esc(s.leagues_used)}/${esc(s.max_leagues)}`;
    if (s.plan==="free" && !s.billing_enabled) html += ` <span class="faint">(upgrades not enabled on this server)</span>`;
    $("billing").innerHTML = html;
    $("upgradeBtn").style.display = (s.plan==="free" && s.billing_enabled) ? "" : "none";
    $("manageBtn").style.display = s.can_manage ? "" : "none";
  }catch(e){ $("billing").textContent = e.message; }
}
async function upgrade(){ try{ const r=await api("POST","/api/billing/checkout"); window.location=r.url; }catch(e){ alert(e.message); } }
async function manageBilling(){ try{ const r=await api("POST","/api/billing/portal"); window.location=r.url; }catch(e){ alert(e.message); } }
function closeSettings(){ $("settings").classList.remove("show"); }
async function refreshEspnStatus(){
  try{ const s=await api("GET","/api/espn/status"); const on=!!s.connected;
    $("espnStatus").innerHTML= on?`Connected (consent ${esc(s.consent_version||'?')})`:"Not connected";
    $("testBtn").style.display=on?"":"none"; $("discBtn").style.display=on?"":"none";
  }catch(e){ $("espnStatus").textContent=e.message; }
}
function connectEnabled(){ $("connectBtn").disabled=!( $("consent").checked && $("s2").value.trim() && $("swid").value.trim() ); }
async function doConnect(){
  try{ const r=await api("POST","/api/espn/connect",{espn_s2:$("s2").value.trim(),swid:$("swid").value.trim(),consent:true,consent_version:CONSENT_VERSION});
    msg("espnMsg","ESPN connected — encrypted and stored.",true); $("s2").value="";$("swid").value=""; refreshEspnStatus(); loadLeagues(); }
  catch(e){ msg("espnMsg",e.message,false); }
}
async function doTest(){ try{ const r=await api("POST","/api/espn/test"); msg("espnMsg",r.valid?"Connection works.":(r.purged?"Cookies invalid — removed. Reconnect.":"Cookies invalid — reconnect."),!!r.valid); refreshEspnStatus(); }catch(e){ msg("espnMsg",e.message,false); } }
async function doDisconnect(){ if(!confirm("Remove your ESPN credentials?"))return; try{ await api("DELETE","/api/espn/credentials"); msg("espnMsg","Disconnected.",true); refreshEspnStatus(); }catch(e){ msg("espnMsg",e.message,false); } }
async function deleteAccount(){ if(!confirm("Delete your account and all data? This cannot be undone."))return;
  try{ await api("DELETE","/api/account"); if(CLERK) await CLERK.signOut(); location.reload(); }catch(e){ alert(e.message); } }

function msg(id,text,ok){ const m=$(id); m.textContent=text; m.className="msg "+(ok?"ok":"err"); }
document.addEventListener("input",(e)=>{ if(["consent","s2","swid"].includes(e.target.id)) connectEnabled(); });
document.addEventListener("change",(e)=>{ if(e.target.id==="consent") connectEnabled(); });

boot();
</script>
</body>
</html>
